<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Margin & Padding</title>
  <style>
    .outter-box {
      height: fit-content;
      width: fit-content;
      background-color: blueviolet;
      padding: 50px;
    }
    .inner-box {
      width: 500px;
      height: 300px;
      background-color: teal;
      margin: 50px;
    }
  </style>
</head>
<body>
  <div class="outter-box">
    <div class="inner-box">
      <h1>Will margin of inner box collapse with padding of outter box?</h1>
      <h1>what's the distance between outter box & inner box?</h1>
    </div>
  </div>
</body>
</html>
