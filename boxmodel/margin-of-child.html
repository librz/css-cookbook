<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Is child's margin relative to its parent?</title>
  <style>
    .parent {
      margin: 0px;
      width: 600px;
      height: 300px;
      background-color: blueviolet;
      /* see: https://stackoverflow.com/questions/1762539/margin-on-child-element-moves-parent-element */
      display: flow-root; /* comment out this line and see what happens */
      /* set overflow-y to hidden or auto also does the trick */
    }
    .child {
      width: 300px;
      height: 150px;
      background-color: orange;
      margin: 50px;
    }
  </style>
</head>
<body>
  <div class="parent">
    <div class="child">

    </div>
  </div>
</body>
</html>
