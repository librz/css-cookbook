<html>
	<head>
		<title>flex item with oversized child element</title>
		<style>
			.container {
				margin: 100px;
				border: 1px solid silver;
				width: 600px;
				display: flex;
				flex-direction: row;
			}
			.box-1 {
				background-color: cyan;
				flex-basis: 100px;
				flex-grow: 1;
				height: 100px;
			}
			.box-2 {
				background-color: purple;
				flex-basis: 100px;
				flex-grow: 1;
				height: 100px;
			}
			.box-3 {
				background-color: teal;
				flex-basis: 100px;
				flex-grow: 1;
				height: 100px;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<div class="box-1"></div>
			<div class="box-2">
				<div style="width: 250px; height: 100px; background-color: red;"></div>
			</div>
			<div class="box-3"></div>
		</div>
	</body>
</html>
