<html>
	<head>
		<title>responsive flex items</title>
	<style>
		body {
			margin: 0px;
		}
		.flexbox {
			margin: 16px;
			padding: 16px;
			border: 4px solid whitesmoke;
			display: flex;
			justify-content: space-between;
			gap: 16px;
		}
		.flexitem {
			flex-basis: 200px;
			flex-grow: 0;
			flex-shrink: 0;
			line-height: 60px;
			text-align: center;
			font-size: 24px;
			border-radius: 8px;
			background-color: blueviolet;
		}
	</style>
	</head>
	<body>
		<div class="flexbox">
			<div class="flexitem">item 1</div>
			<div class="flexitem">item 2</div>
			<div class="flexitem">item 3</div>
			<div class="flexitem">item 4</div>
			<div class="flexitem">item 5</div>
		</div>
	</body>
</html>
